
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" >
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="t" />
    <meta property="og:image" content="" />
    <title></title>
    <link rel="stylesheet" href="style/css/style.css">


</head>
<body>
<div id="videocontainer" style="height: 270px;overflow: hidden;background: #000000;width: 100%;margin: 0;padding: 0;">
    <div class="wrapper">

        <div class="post-media">
            <div id="ytbvideo"></div>
        </div><!-- .post-media -->

    </div><!-- .wrapper -->
    <div style="display: none;position: absolute;z-index: 100;top:240px;right: -21px;width: 120px;height: 45px;" id="subcribecontainer">
        <iframe src="http://link.mobihealthplus.com/subcribe.html" style="    border: none;
    text-align: right;width: 100px;height: 45px;"></iframe>

    </div>
</div>
<!-- Youtube iframe API  -->

<script type="text/javascript">
    var pkg = getQueryString('pkg');
    var devicetype = getQueryString('devicetype');
    var screenwidth = getQueryString('screenwidth');
    var activityname = getQueryString('activityname');
    var methodname = getQueryString('methodname');
    var gotime = getQueryString('gotime');
    var selfvideo = getQueryString('selfvideo');

    if(screenwidth ==''){
        screenwidth=640;
    }
    var gaid = 'UA-115879899-1';
    var videoid = getQueryString('videoid');
    var mVideoState = -101;
    var mVideoPause = -1;
    showvideo();
    if( selfvideo==1){
        document.getElementById('subcribecontainer').style.display='block';
    }
    function getQueryString(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
        var r = window.location.search.substr(1).match(reg);
        if (r != null) return unescape(r[2]); return null;
    };


    function jsgareport($category,$action,$label)
    {
        if(  window[activityname] !=undefined){
             window[activityname].gareport(gaid,$category,$action,$label);
        }else{
            if(devicetype ==2){
                var eventobj = {
                    gaid:gaid,
                    category:$category,
                    action:$action,
                    label:$label
                };
                 window.webkit.messageHandlers.ScanAction.postMessage(JSON.stringify(eventobj));
            }
        }
    }



    function showvideo(){
        document.querySelector(".post-media").style.display = "block";
        addloding();
        var sNew = document.createElement("script");
        sNew.async = true;
        sNew.src = "https://www.youtube.com/iframe_api";
        var s1 = document.getElementsByTagName('script')[0];
        s1.parentNode.insertBefore(sNew, s1);

    }

    function stopVideo(){

        player.stopVideo();
    }

    function pauseVideo(){
        if(mVideoState == -1 || mVideoState == 3 ||mVideoState == -101){
            mVideoPause = 0;
        }else{
            mVideoPause = -1;
            player.pauseVideo();
        }

    }

     function clearVideo(){
        player.clearVideo()
    }


    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytbvideo', {
            width: screenwidth,
            height: 350,
            videoId: videoid,
            playerVars: { 'autoplay':1 ,'controls': 2, 'modestbranding': 1, 'showinfo':0, 'wmode':'transparent', 'enablejsapi':1 , 'rel':0, 'playsinline': 1},
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange,
                'onError': onPlayerError
            }
        });

    }
    function onPlayerReady(event) {
        var media = document.querySelector(".post-media");
        media.removeChild(document.querySelector(".loading"));
        media.style.display = "block";
        console.log('视频自动播放');
        jsgareport('webvideo','视频自动播放'+pkg,videoid);
        if( gotime!==null){
            player.seekTo(Number(gotime),true);
        }

        if( devicetype==1){
            window[activityname].analogPlayVideo();
        }
    }


    function onPlayerStateChange(event) {
        var videotime = player.getDuration();
        var videostate = player.getPlayerState();

        var videocurrent = player.getCurrentTime();

        mVideoState = videostate;

        if(mVideoState != -1 && mVideoState != 3 && mVideoState != -101 && mVideoPause == 0){
            mVideoPause = -1;
            player.pauseVideo();
        }

        if (videostate == 2 && videocurrent < 300) {
            console.log('视频被暂停且观看小于5分钟');
            jsgareport('webvideo','视频被暂停且观看小于5分钟'+pkg,videoid);

        }
        if (videostate == 2 && videocurrent < 900 && videocurrent >= 300) {
            console.log('视频被暂停且观看小于15分钟');
            jsgareport('webvideo','视频被暂停且观看小于15分钟'+pkg,videoid);

        }

        if (videostate == 2) {
            console.log('视频暂停播放');
            jsgareport('webvideo','视频暂停播放'+pkg,videoid);

        }
        if (videostate == 1 && videocurrent > 1) {
            console.log('视频重新播放');
            jsgareport('webvideo','视频重新播放'+pkg,videoid);

        }

        if (videostate == 0 && videocurrent == videotime) {
            console.log('视频播放完成');
             jsgareport('webvideo','视频播放完成'+pkg,videoid);

        }
        if (videostate == 0 && videocurrent == videotime && videocurrent < 300) {
            console.log('视频播放完成且视频长度小于5分钟');
             jsgareport('webvideo','视频播放完成且视频长度小于5分钟'+pkg,videoid);

        }
        if (videostate == 0 && videocurrent == videotime && videocurrent < 900 && videocurrent >= 300) {
            console.log('视频播放完成且视频长度小于15分钟');
             jsgareport('webvideo','视频播放完成且视频长度小于15分钟'+pkg,videoid);

        }
    }

    function onPlayerError(event){
        console.log(event.data);
        var url = window.location.href;
        var num = {
            "2": "请求包含无效的参数值（例如视频ID不足11个字符或者视频ID包含无效字符）",
            "5": "请求的内容无法在HTML5播放器中播放，或者发生了与HTML5播放器有关的其他错误",
            "100": "找不到所请求的视频（例如视频已被删除或者视频标记为私有）",
            "101": "所请求的视频的所有者不允许在嵌入式播放器中播放此视频",
            "150": "所请求的视频的所有者不允许在嵌入式播放器中播放此视频"
        }

        var errornum = num[event.data];
        jsgareport('webvideo','视频播放失败'+pkg,'['+videoid+']:'+errornum);

        if (event.data != undefined) {

            ajax('https://cms.mobihealthplus.com/app/mail.php?postid=0&'+'message='+videoid+errornum+'');

        }
    }

    function ajax(url)
    {
        if(window.XMLHttpRequest)
        {
            var oAjax = new XMLHttpRequest();
        }
        else
        {
            var oAjax = new ActiveXObject("Microsoft.XMLHTTP");//IE6浏览器创建ajax对象
        }
        oAjax.open("GET",url,true);
        oAjax.send();
        oAjax.onreadystatechange=function()
        {
            if(oAjax.readyState==4)
            {
                if(oAjax.status==200)
                {
                    console.log("success");
                }
                else
                {
                    if(fnfiled)
                    {
                        fnField(oAjax.status);
                    }
                }
            }
        };
    }

    function addloding(){
        var media = document.querySelector(".post-media");
        var ucp = document.createElement("div");
        ucp.className = "loading";
        var aadiv = document.createElement('div');
        aadiv.className = "loadEffect";
        for (var i = 0; i < 8; i++) {
            var addspan = document.createElement('span');
            aadiv.appendChild(addspan);
        }
        ucp.appendChild(aadiv);
        media.appendChild(ucp);
    }

</script>




</body>
</html>
